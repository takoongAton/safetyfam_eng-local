	<!-- css -->
	<link rel="stylesheet" href="../../css/reset.css" />

<body>

<div class="wrap">

	<div class="header_wrap">
		<div class="temp">
			<div class="util">
				<button type="button"><span><img src="../../images/common/ico_back.png" alt="이전"></span></button>
				<!-- <button type="button"><span><img src="../../images/common/ico_home.png" alt="홈"></span></button> -->
			</div>
			<h1><strong>이메일 주소 등록</strong></h1>
			<!-- <div class="tools">
				<button type="button"><span><img src="../../images/common/ico_noti.png" alt="알림"></span></button>
			</div> -->
		</div>
		<!-- // temp 삭제 -->
	</div>
	<!-- // header_wrap -->

	<div class="container_wrap">

		<section class="container">

			<div class="content_wrap divide">

				<div class="content_top">

					<div class="email_regedit">
						<p class="txt">다양한 혜택을 받기 위해 <br />
							이메일 주소를 등록해 주세요.
						</p>
						<div class="input_wrap">
							<input type="email" placeholder="example@email.com">
						</div>
						<div class="agreement_area">
							<label>
								<input type="checkbox">
								<span class="checkmark"></span>
								<span class="txt">이메일 주소 수집에 동의합니다.</span>
							</label>
							<button type="button" class="btn_agree_info"><span class="txt">보기</span></button>
						</div>
					</div>
					<!-- // email_regedit -->

				</div>
				<!-- // content_top -->

				<div class="content_btm">
					<div class="btm_btn">
						<div>
							<button type="button" class="btn_next"><span>확인</span></button>
						</div>
					</div>
				</div>

			</div><!-- // content_wrap -->
			
		</section><!-- // container -->
		
	</div><!-- // container_wrap -->


</div><!-- // wrap -->
