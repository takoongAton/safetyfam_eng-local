<!DOCTYPE html>
<html lang="ko">
	<head>
	<title>자녀안전지킴이</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	
	<!-- font -->
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=block" rel="stylesheet" />
	
	<!-- css -->
	<link rel="stylesheet" href="../../css/reset.css" />
	<link rel="stylesheet" href="../../css/safetyfam_app.css" />
	<!-- <link rel="stylesheet" href="../../css/Global.css" /> -->
	<link rel="stylesheet" href="../../css/slick.css" />
</head>
<body>

<div class="wrap">

	<div class="header_wrap">
		<div class="temp">
			<div class="util">
				<button type="button"><span><img src="../../images/common/ico_back.png" alt="이전"></span></button>
				<!-- <button type="button"><span><img src="../../images/common/ico_home.png" alt="홈"></span></button> -->
			</div>
			<h1><strong>앱 사용 시간 관리</strong></h1>
			<!-- <div class="tools">
				<button type="button"><span><img src="../../images/common/ico_noti.png" alt="알림"></span></button>
			</div> -->
		</div>
		<!-- // temp 삭제 -->
	</div>
	<!-- // header_wrap -->

	<div class="container_wrap">

		<section class="container">

			<div class="content_wrap">

				<div class="content">
					
					<div class="flex_box_list">
						<div class="box inner">
							<div class="noti_card">
								<span class="ico"><img src="../../images/common/ico_alert_unlink.png" alt="연결끊김"></span>
								<div>
									<strong>%닉네임%의 앱 사용시간을 확인할 수 없어요.</strong>
									<p>자녀의 휴대폰에서 스크린타임 권한을 허용해 주세요.</p>
								</div>
							</div>
							<!-- // noti_card -->
						</div>

						<div class="box inner">

							<div class="custom-select_wrap">
								<div class="custom-select">
									<div class="inner">
										<div class="triger">
											<button type="button" class="btn_triger"><span>나나</span></button>
										</div>
										<div class="list_box">
											<ul>
												<li><span>니니</span></li>
												<li><span>알상무</span></li>
											</ul>
										</div>
									</div>
								</div>
								<!-- // custom-select -->
							</div>
						</div>
						<div class="box inner">
							<div class="shadow_box">
								<div class="txt_box">
									<p class="txt">오늘 사용 시간 <strong>hh</strong>시간 <strong>mm</strong>분</p>
								</div>
							</div>
						</div>

						<div class="box inner">
							<div class="screen_time_report">
								<div class="custom-select_wrap">
									<div class="txt_box">
										<p class="txt"><strong>스크린타임 리포트</strong></p>
									</div>
									<div class="custom-select">
										<div class="inner">
											<div class="triger">
												<button type="button" class="btn_triger"><span>오늘</span></button>
											</div>
											<div class="list_box">
												<ul>
													<li><span>날짜선택</span></li>
												</ul>
										</div>
										</div>
									</div>
									<!-- // custom-select -->
								</div>
							</div>
						</div>

						<div class="box inner">
							<div class="screen_time_report_wrap">
								<div class="txt_box">
									<p class="txt">
										<strong>총 hh시간 mm분</strong>
									</p>
								</div>
								<div class="graph_section"><img src="../../images/temp/sample_graph_week.png" alt="지난7일 샘플"></div>
								<!-- <div class="graph_section"><img src="../../images/temp/sample_graph_today.png" alt="오늘 샘플"></div>
								<div class="graph_section"><img src="../../images/temp/sample_graph_month.png" alt="지난달 샘플"></div> -->

								<ul class="app_list">
									<li>
										<div class="app_info">
											<span class="app_icon"><img src="../../images/common/img_time_default.png" alt="앱아이콘"></span>
											<span class="app_name">%앱 이름%</span>
										</div>
										<div class="use_info">
											<span class="use_status"><img src="../../images/common/ico_block.png" alt="앱잠김"></span>
											<div class="use_time">
												<strong>01</strong>
												<span>시간</span>
												<strong>02</strong>
												<span>분</span>
											</div>
										</div>
									</li>
									<li>
										<div class="app_info">
											<span class="app_icon"><img src="../../images/common/img_time_default.png" alt="앱아이콘"></span>
											<span class="app_name">%앱 이름%</span>
										</div>
										<div class="use_info">
											<span class="use_status"><img src="../../images/common/ico_time.png" alt="앱잠김"></span>
											<div class="use_time">
												<strong>hh</strong>
												<span>시간</span>
												<strong>mm</strong>
												<span>분</span>
											</div>
										</div>
									</li>
									<li>
										<div class="app_info">
											<span class="app_icon"><img src="../../images/common/img_time_default.png" alt="앱아이콘"></span>
											<span class="app_name">%앱 이름%</span>
										</div>
										<div class="use_info">
											<span class="use_status"><img src="../../images/common/ico_block.png" alt="앱잠김"></span>
											<div class="use_time">
												<strong>hh</strong>
												<span>시간</span>
												<strong>mm</strong>
												<span>분</span>
											</div>
										</div>
									</li>
									<li>
										<div class="app_info">
											<span class="app_icon"><img src="../../images/common/img_time_default.png" alt="앱아이콘"></span>
											<span class="app_name">%앱 이름%</span>
										</div>
										<div class="use_info">
											<span class="use_status"><img src="../../images/common/ico_block.png" alt="앱잠김"></span>
											<div class="use_time">
												<strong>hh</strong>
												<span>시간</span>
												<strong>mm</strong>
												<span>분</span>
											</div>
										</div>
									</li>
								</ul>
							</div>
						</div>
					</div>
					<!-- // div -->


				</div>
				<!-- // content -->

				<!-- <div class="content_btm">
					<div class="btm_btn">
						<div><button type="button" class="btn_next"><span>더보기</span></button></div>
					</div>
				</div> -->

			</div><!-- // content_wrap -->
			
		</section><!-- // container -->
		
	</div><!-- // container_wrap -->


	<div class="footer_wrap">
		<div class="bottom-nav-wrapper">
			<nav class="bottom-nav">
				<ul class="bottom-nav__list">
					<li class="bottom-nav__item">
						<a href="#home" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_home_off.png" alt="홈">
							</span>
							<span class="bottom-nav__label">Home</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#location" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_location_off.png" alt="아이 위치">
							</span>
							<span class="bottom-nav__label">Location</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#guard" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_chat_off.png" alt="Monitoring">
							</span>
							<span class="bottom-nav__label">Chat Guard</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#settings" class="bottom-nav__link is-active">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_set_on.png" alt="설정">
							</span>
							<span class="bottom-nav__label">Settings</span>
						</a>
					</li>
				</ul>
			</nav>
		</div>
	</div>
	<!-- // footer_wrap -->





</div><!-- // wrap -->
