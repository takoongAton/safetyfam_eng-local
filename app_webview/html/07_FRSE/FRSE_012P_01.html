<!DOCTYPE html>
<html lang="ko">
	<head>
	<title>자녀안전지킴이</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	
	<!-- font -->
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=block" rel="stylesheet" />
	
	<!-- css -->
	<link rel="stylesheet" href="../../css/reset.css" />
	<link rel="stylesheet" href="../../css/safetyfam_app.css" />
	<!-- <link rel="stylesheet" href="../../css/Global.css" /> -->
	<link rel="stylesheet" href="../../css/slick.css" />
</head>
<body>

<div class="wrap">

	<div class="header_wrap">
		<div class="temp">
			<div class="util">
				<button type="button"><span><img src="../../images/common/ico_back.png" alt="이전"></span></button>
				<!-- <button type="button"><span><img src="../../images/common/ico_home.png" alt="홈"></span></button> -->
			</div>
			<h1><strong>알림 수신 설정</strong></h1>
			<!-- <div class="tools">
				<button type="button"><span><img src="../../images/common/ico_noti.png" alt="알림"></span></button>
			</div> -->
		</div>
		<!-- // temp 삭제 -->
	</div>
	<!-- // header_wrap -->

	<div class="container_wrap">

		<section class="container">

			<div class="content_wrap">

				<div class="content">
					<div class="setting_box_list">
						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">안심존 이탈 알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch3" data-switch="primary" checked="">
									<label for="set_switch3" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->
						</div>

						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">미 사용 감지 알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch4" data-switch="primary" checked="">
									<label for="set_switch4" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->

							<div class="setting_link">
								<span class="tit">미 사용 감지 시간</span>
								<span class="value">1일</span>
							</div>
							<!-- // setting_link -->
						</div>

						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">충격 감지 알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch5" data-switch="primary">
									<label for="set_switch5" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->

							<div class="setting_link disabled">
								<span class="tit">충격 감지 민감도</span>
								<span class="value">2단계</span>
							</div>
							<!-- // setting_link -->
						</div>

						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">긴급 SOS  알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch6" data-switch="primary" checked="">
									<label for="set_switch6" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->
						</div>

						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">유해 메시지 알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch7" data-switch="primary" checked="">
									<label for="set_switch7" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->
						</div>

						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">대화 리포트 알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch8" data-switch="primary" checked="">
									<label for="set_switch8" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->
						</div>

						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">앱 사용시간 알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch9" data-switch="primary" checked="">
									<label for="set_switch9" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->
						</div>

						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">배터리 잔량 알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch10" data-switch="primary" checked="">
									<label for="set_switch10" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->
						</div>

						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">전원 ON/OFF 알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch11" data-switch="primary" checked="">
									<label for="set_switch11" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->
						</div>

						<div class="box">
							<div class="setting_toggle">
								<strong class="tit">혜택 및 마케팅 알림</strong>
								<div class="ipt_switch">
									<input type="checkbox" id="set_switch12" data-switch="primary" checked="">
									<label for="set_switch12" data-on-label="" data-off-label=""></label>
								</div>
							</div>
							<!-- // setting_toggle -->
						</div>
					</div>
					<!-- // setting_box_list -->
				</div>
				<!-- // content -->

				<!-- <div class="content_btm">
					<div class="btm_btn">
						<div><button type="button" class="btn_next"><span>더보기</span></button></div>
					</div>
				</div> -->

			</div><!-- // content_wrap -->
			
		</section><!-- // container -->
		
	</div><!-- // container_wrap -->


	<div class="footer_wrap">
		<div class="bottom-nav-wrapper">
			<nav class="bottom-nav">
				<ul class="bottom-nav__list">
					<li class="bottom-nav__item">
						<a href="#home" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_home_off.png" alt="홈">
							</span>
							<span class="bottom-nav__label">홈</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#location" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_location_off.png" alt="아이 위치">
							</span>
							<span class="bottom-nav__label">아이 위치</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#guard" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_chat_off.png" alt="채팅 가드">
							</span>
							<span class="bottom-nav__label">채팅 가드</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#settings" class="bottom-nav__link is-active">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_set_on.png" alt="설정">
							</span>
							<span class="bottom-nav__label">설정</span>
						</a>
					</li>
				</ul>
			</nav>
		</div>
	</div>
	<!-- // footer_wrap -->


</div><!-- // wrap -->

<div class="dim"></div>
<div class="modal-side" id="testpop123">
	<div class="modal-side__content">
		<div class="modal-side__header">
			<p class="modal-side__title">미 사용 감지 시간</p>
		</div>
		<div class="modal-side__custom">
			<div class="setting_custom">
				<ul>
					<li>1일</li>
					<li>2일</li>
					<li>3일</li>
				</ul>
			</div>
		</div>
	</div>

		<button type="button" class="btn modal-side__btn-cancel" id="btnExitCancel">
