<!DOCTYPE html>
<html lang="ko">
	<head>
	<title>자녀안전지킴이</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	
	<!-- font -->
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=block" rel="stylesheet" />
	
	<!-- css -->
	<link rel="stylesheet" href="../../css/reset.css" />
	<link rel="stylesheet" href="../../css/safetyfam_app.css" />
	<!-- <link rel="stylesheet" href="../../css/Global.css" /> -->
	<link rel="stylesheet" href="../../css/slick.css" />


</head>
<body>

<div class="wrap">

	<div class="header_wrap">
		<div class="temp">
			<div class="util">
				<button type="button"><span><img src="../../images/common/ico_back.png" alt="이전"></span></button>
				<!-- <button type="button"><span><img src="../../images/common/ico_home.png" alt="홈"></span></button> -->
			</div>
			<h1><strong>앱 사용 시간 관리</strong></h1>
			<!-- <div class="tools">
				<button type="button"><span><img src="../../images/common/ico_noti.png" alt="알림"></span></button>
			</div> -->
		</div>
		<!-- // temp 삭제 -->
	</div>
	<!-- // header_wrap -->

	<div class="container_wrap">

		<section class="container">

			<div class="content_wrap">

				<div class="content">

					<div class="flex_box_list">
						<div class="box inner">
							<div class="noti_card">
								<span class="ico"><img src="../../images/common/ico_alert_unlink.png" alt="연결끊김"></span>
								<div>
									<strong>%닉네임%의 앱 사용시간을 확인할 수 없어요.</strong>
									<p>자녀의 휴대폰에서 스크린타임 권한을 허용해 주세요.</p>
								</div>
							</div>
							<!-- // noti_card -->
						</div>

						<div class="box inner">

							<div class="custom-select_wrap">
								<div class="custom-select">
									<div class="inner">
										<div class="triger">
											<button type="button" class="btn_triger"><span>나나</span></button>
										</div>
										<div class="list_box">
										<ul>
											<li><span>니니</span></li>
											<li><span>알상무</span></li>
										</ul>
										</div>
									</div>
								</div>
								<!-- // custom-select -->
							</div>
						</div>

						<div class="box inner">
							<div class="shadow_box">
								<div class="txt_box">
									<span class="ico"><img src="../../images/common/ico_notice.png" alt="아이콘"></span>
									<p class="txt">오늘은 자녀의 앱 사용 내역이 확인되지 않았어요.</p>
								</div>
							</div>
						</div>

						<div class="box inner">
							<div class="custom-select_wrap">
								<div class="txt_box">
									<p class="txt"><strong>스크린타임 리포트</strong></p>
								</div>
								<div class="custom-select">
									<div class="inner">
										<div class="triger">
											<button type="button" class="btn_triger"><span>지난 7일</span></button>
										</div>
										<div class="list_box">
											<ul>
												<li><span>날짜선택</span></li>
											</ul>
									</div>
									</div>
								</div>
								<!-- // custom-select -->
							</div>
						</div>

						<div class="box inner">
							<div class="shadow_box">

								<div class="screen_time_report_wrap">
									<div class="error">
										<div class="img"><img src="../../images/common/ico_caution.png" alt="아이콘"></div>
										<div class="tit">앱 사용 내역이 확인되지 않습니다.<br />
											앱 사용이 감지되면 그래프로 표시됩니다.</div>
									</div>
								</div>
							</div>
						</div>
					</div>
					<!-- // div -->
				</div>
				<!-- // content -->

				<!-- <div class="content_btm">
					<div class="btm_btn">
						<div><button type="button" class="btn_next"><span>더보기</span></button></div>
					</div>
				</div> -->

			</div><!-- // content_wrap -->
			
		</section><!-- // container -->
		
	</div><!-- // container_wrap -->


	<div class="footer_wrap">
		<div class="bottom-nav-wrapper">
			<nav class="bottom-nav">
				<ul class="bottom-nav__list">
					<li class="bottom-nav__item">
						<a href="#home" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_home_off.png" alt="홈">
							</span>
							<span class="bottom-nav__label">홈</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#location" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_location_off.png" alt="아이 위치">
							</span>
							<span class="bottom-nav__label">아이 위치</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#guard" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_chat_off.png" alt="채팅 가드">
							</span>
							<span class="bottom-nav__label">채팅 가드</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#settings" class="bottom-nav__link is-active">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_set_on.png" alt="설정">
							</span>
							<span class="bottom-nav__label">설정</span>
						</a>
					</li>
				</ul>
			</nav>
		</div>
	</div>
	<!-- // footer_wrap -->





</div><!-- // wrap -->





<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="../../js/slick.js"></script>
<script src="../../js/temp.js"></script>



</body>
</html>
