<style>
/* 스크린타임 그래프 리포트 */
.screen_time_report_graph { display:flex; flex-direction:column; gap:0; width:100%; padding:6px 0; background-color:#fff; border-radius:12px; box-shadow:inset 0 0 0 1px #EFEFEF, 0 1px 6px rgba(0, 0, 0, 0.16); overflow:hidden;}
.screen_time_report_graph div.tit {padding:6px 12px; font-size:16px; line-height:20px; font-weight:700;}
.screen_time_report_graph .graph_section {width:100%;}
.screen_time_report_graph .app_list {display:flex; flex-direction:column; gap:0 8px; width:100%;}
.screen_time_report_graph .app_list li {display:flex; justify-content:space-between; align-items:center; padding:11px 12px;}
.screen_time_report_graph .app_list li div.app_info {display:flex; align-items:center; gap:0 6px;}
.screen_time_report_graph .app_list li div.app_info span {display:inline-block;}
.screen_time_report_graph .app_list li div.app_info span.app_icon {width:24px; height:24px; border-radius:10px; overflow:hidden;}
.screen_time_report_graph .app_list li div.app_info span.app_name {font-size:14px;;}

.screen_time_report_graph .app_list li div.use_info {display:flex; align-items:center; gap:0 6px;}
.screen_time_report_graph .app_list li div.use_info span {display:inline-block; width:24px; height:24px;}
.screen_time_report_graph .app_list li div.use_info div.use_time {display:flex; position:relative; top:0.1em;}
.screen_time_report_graph .app_list li div.use_info div.use_time strong,
.screen_time_report_graph .app_list li div.use_info div.use_time span {display:inline-block; font-size:14px; line-height:20px; white-space:nowrap; font-family:'Noto Sans KR';}
.screen_time_report_graph .app_list li div.use_info div.use_time strong {color:#000; font-weight:700;}
.screen_time_report_graph .app_list li div.use_info div.use_time span {color:#9F9F9F; font-weight:400;}
/* // 스크린타임 그래프 리포트 */
</style>
</head>

							<div class="noti_card">

							</div>
							<!-- // noti_card -->
						</div>

						<div class="box inner">

							<div class="custom-select_wrap">
								<div>
									<div class="custom-select">
										<div class="triger">
											<button type="button" class="btn_triger"><span>나나</span></button>
										</div>
										<ul>
											<li><span>니니</span></li>

										</ul>
									</div>
									<!-- // custom-select -->
								 </div>

								<div>
									<div class="custom-select">
										<div class="triger">

								 </div>
							</div>
						</div>

						<div class="box inner">

										</div>
										<ul>
											<li><span>날짜선택</span></li>
										</ul>
									</div>
									<!-- // custom-select -->
								</div>


								<div class="screen_time_report_graph">

										<div class="img"><img src="../../images/common/ico_caution.png" alt="아이콘"></div>
										<div class="tit">앱 사용 내역이 확인되지 않습니다.<br />
											앱 사용이 감지되면 그래프로 표시됩니다.</div>
									</div>
								</div>
							</div>
						</div>
					</div>
					<!-- // div -->


				</div>
				<!-- // content -->

				<!-- <div class="content_btm">
					<div class="btm_btn">
						<div><button type="button" class="btn_next"><span>더보기</span></button></div>
					</div>
				</div> -->

			</div><!-- // content_wrap -->
			
		</section><!-- // container -->
		
	</div><!-- // container_wrap -->


	<div class="footer_wrap">
		<div class="bottom-nav-wrapper">
			<nav class="bottom-nav">

<div class="modal-side" id="testpop123">
	<div class="modal-side__content">
		<div class="modal-side__header">
			<!-- <span class="modal-side__icon"><img src="../../images/common/ico_caution.png" alt="아이콘"></span> -->
			<p class="modal-side__title">앱 사용 제한 설정</p>
			<p class="modal-side__desc">설정한 기간 동안 앱 사용이 제한됩니다.</p>
		</div>
		<div class="modal-side__custom">

			<div class="screen_time_setting">
				<div class="setting_type">
					<div class="setting_radio">
						<label><input type="radio" name="screen_time_setting_rdo" id="screen_time_setting_rdo01" /><span class="checkmark"></span><span class="txt">즉시 차단</span></label>
					</div>
				</div>
				<div class="setting_type">
					<div class="setting_radio">
						<label><input type="radio" name="screen_time_setting_rdo" id="screen_time_setting_rdo01" /><span class="checkmark"></span><span class="txt">예약 차단</span></label>
					</div>
					<div class="setting_range">
						<div class="set_start">
							<p>시작 일시</p>
							<div class="row">
								<div>
									<input type="text" placeholder="YYYY.MM.DD">
								</div>
								<div>
									<input type="text" placeholder="HH.MM">
								</div>
							</div>
						</div>
						<div class="set_end">
							<p>종료 일시</p>
							<div class="row">
								<div>
									<input type="text" placeholder="YYYY.MM.DD" value="2026.3.17" />
								</div>
								<div>
									<input type="text" placeholder="HH.MM" value="오후 2:36" />
								</div>
							</div>
						</div>
					</div>
				</div>
				
			</div>
			<!-- // screen_time_setting -->
