<!DOCTYPE html>
<html lang="ko">
	<head>
	<title>자녀안전지킴이</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	
	<!-- font -->
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=block" rel="stylesheet" />
	
	<!-- css -->
	<link rel="stylesheet" href="../../css/reset.css" />
	<link rel="stylesheet" href="../../css/safetyfam_app.css" />
	<!-- <link rel="stylesheet" href="../../css/Global.css" /> -->
	<link rel="stylesheet" href="../../css/slick.css" />

</head>
<body>

<div class="wrap">

	<div class="header_wrap">
		<div class="temp">
			<div class="util">
				<button type="button"><span><img src="../../images/common/ico_back.png" alt="이전"></span></button>
				<!-- <button type="button"><span><img src="../../images/common/ico_home.png" alt="홈"></span></button> -->
			</div>
			<h1><strong>긴급 호출</strong></h1>
			<!-- <div class="tools">
				<button type="button"><span><img src="../../images/common/ico_noti.png" alt="알림"></span></button>
			</div> -->
		</div>
		<!-- // temp 삭제 -->
	</div>
	<!-- // header_wrap -->

	<div class="container_wrap">

		<section class="container">

			<div class="content_wrap full">

				<div class="content_center">
					
					<div class="error">
						<div class="img"><img src="../../images/common/img_nochildren.png" alt="아이콘"></div>
						<div class="tit">자녀와 연결되어 있지 않아요.</div>
						<p class="txt">초대 링크를 보내 자녀를 등록해 보세요.</p>
						<button type="button" class="btn">
							<span class="ico"><img src="../../images/common/ico_btn_link.png" alt="새로고침 아이콘"></span>
							<span class="txt">자녀 연결 관리</span>
						</button>
					</div>

				</div>
				<!-- // content_mid -->

				<div class="overlay_panel bottom">
						<div class="box">
							<div class="safety_list_wrap">
								<ul>
									<li>
										<button type="button" class="btn_zone" disabled>
											<span class="ico"><img src="../../images/common/ico_map_path_off.png" alt="이동 경로 아이콘" /></span>
											<span class="txt">이동 경로</span>
										</button>
									</li>
									<li>
										<button type="button" class="btn_zone" disabled>
											<span class="ico"><img src="../../images/common/ico_map_safezone_off.png" alt="안심존+ 아이콘" /></span>
											<span class="txt">안심존+</span>
										</button>
									</li>
									<li>
										<button type="button" class="btn_zone" disabled>
											<span class="ico"><img src="../../images/common/ico_map_nearby_off.png" alt="주변지역 아이콘" /></span>
											<span class="txt">주변 지역</span>
										</button>
									</li>
								</ul>
							</div>
							<!-- // safety_list_wrap -->
						</div>
						<!-- // box -->
					</div>

			</div><!-- // content_wrap -->
			
		</section><!-- // container -->
		
	</div><!-- // container_wrap -->


	<div class="footer_wrap">
		<div class="bottom-nav-wrapper">
			<nav class="bottom-nav">
				<ul class="bottom-nav__list">
					<li class="bottom-nav__item">
						<a href="#home" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_home_off.png" alt="홈">
							</span>
							<span class="bottom-nav__label">홈</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#location" class="bottom-nav__link is-active">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_location_on.png" alt="아이 위치">
							</span>
							<span class="bottom-nav__label">아이 위치</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#guard" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_chat_off.png" alt="채팅 가드">
							</span>
							<span class="bottom-nav__label">채팅 가드</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#settings" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_set_off.png" alt="설정">
							</span>
							<span class="bottom-nav__label">설정</span>
						</a>
					</li>
				</ul>
			</nav>
		</div>
	</div>
	<!-- // footer_wrap -->


</div><!-- // wrap -->






<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="../../js/slick.js"></script>
<script src="../../js/temp.js"></script>


<script>
</script>

</body>
</html>
