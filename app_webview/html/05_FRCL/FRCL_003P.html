.my_safety_zone_wrap {display:flex; flex-direction:column; gap:12px; width:100%; padding:0 18px;}

.my_safety_zone_list ul li strong {display:block; color:#000; font-size:16px; line-height:1.3125em; font-weight:700;}
.my_safety_zone_list ul li p {color:#9F9F9F; font-size:12px; line-height:1.41666em; font-weight:400;}
.my_safety_zone_list ul li::after {content:''; position:absolute; top:50%; right:12px; width:24px; height:24px; background:url('../../images/common/ico_arrow_right.png'); background-size:100%;transform: translateY(-50%);}
