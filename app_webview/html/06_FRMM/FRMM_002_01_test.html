<!DOCTYPE html>
<html lang="ko">
	<head>
	<title>자녀안전지킴이</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	
	<!-- font -->
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=block" rel="stylesheet" />
	
	<!-- css -->
	<link rel="stylesheet" href="../../css/reset.css" />
	<link rel="stylesheet" href="../../css/safetyfam_app.css" />
	<!-- <link rel="stylesheet" href="../../css/Global.css" /> -->
	<!-- <link rel="stylesheet" href="../../css/slick.css" /> -->
</head>
<body>

<div class="wrap">

	<div class="header_wrap">
		<div class="temp">
			<div class="util">
				<button type="button"><span><img src="../../images/common/ico_back.png" alt="이전"></span></button>
				<!-- <button type="button"><span><img src="../../images/common/ico_home.png" alt="홈"></span></button> -->
			</div>
			<h1><strong>주변 소리 듣기</strong></h1>
			<!-- <div class="tools">
				<button type="button"><span><img src="../../images/common/ico_noti.png" alt="알림"></span></button>
			</div> -->
		</div>
		<!-- // temp 삭제 -->
	</div>
	<!-- // header_wrap -->

	<div class="container_wrap">

		<section class="container">

			<div class="content_wrap divide">

				<div class="content_top">

					<div class="box inner mb12" style="margin-bottom:12px;">
						<div class="noti_card">
							<span class="ico"><img src="../../images/common/ico_alert_mic.png" alt="마이크"></span>
							<div>
								<strong>현재 주변 소리를 들을 수없어요.</strong>
								<p>자녀의 휴대폰에서 마이크 권한을 허용해 주세요.</p>
							</div>
						</div>
					</div>


					<div class="list_filter">
						<div class="list_select_wrap left">
							<div class="inner">
								<div class="triger"><button type="button" class="btn_triger"><span>나나</span></button></div>
								<ul class="">
									<li><span>니니</span></li>
								</ul>
							</div>
						</div>
					</div>
					<!-- // list_filter -->
				</div>

				<div class="content_center">

					<div class="sound_guard_wrap">

						<div class="recording_wrap">
							<div class="inner active">
								<div class="recording_display">
									<div class="icon">
										<span><img src="../../images/common/ico_record.png" alt="녹음"></span>
									</div>
									<div class="txt_wrap">
										<strong class="timer">00:02:17</strong>
										<p class="txt">Listening to surrounding sounds.</p>
									</div>
								</div>
								<div class="recording_tools">
									<button type="button" class="btn_recording">
										<!-- <span><img src="../../images/common/ico_sound.png" alt="듣기 버튼"></span> -->
										<span><img src="../../images/common/ico_stop.png" alt="중지"></span>
									</button>
									<span class="txt">중지</span>
								</div>
							</div>
						</div>

						
					</div>
					<!-- // sound_guard_wrap -->

					
				</div>

			</div><!-- // content_wrap -->
			
		</section><!-- // container -->
		
	</div><!-- // container_wrap -->


	<div class="footer_wrap">
		<div class="bottom-nav-wrapper">
			<nav class="bottom-nav">
				<ul class="bottom-nav__list">
					<li class="bottom-nav__item">
						<a href="#home" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_home_off.png" alt="홈">
							</span>
							<span class="bottom-nav__label">홈</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#location" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_location_off.png" alt="아이 위치">
							</span>
							<span class="bottom-nav__label">Location</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#guard" class="bottom-nav__link is-active">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_chat_on.png" alt="Monitoring">
							</span>
							<span class="bottom-nav__label">Monitoring</span>
						</a>
					</li>

					<li class="bottom-nav__item">
						<a href="#settings" class="bottom-nav__link">
							<span class="bottom-nav__icon">
								<img src="../../images/common/ico_gnb_set_off.png" alt="설정">
							</span>
							<span class="bottom-nav__label">Settings</span>
						</a>
					</li>
				</ul>
			</nav>
		</div>
	</div>
	<!-- // footer_wrap -->

</div><!-- // wrap -->








<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<!-- <script src="../../js/slick.js"></script> -->
<script src="../../js/temp.js"></script>


<script>

/* 공지사항, 자주 묻는 질문 */
let noticeWrap = document.querySelector(".notice_arcodian_wrap")
if(noticeWrap) {
	let listItems = document.querySelectorAll(".list .item");
	listItems.forEach(function(item){
		item.addEventListener("click", function(){
			item.classList.toggle("active");
		})
	})
}
/* // 공지사항, 자주 묻는 질문 */

</script>

</body>
</html>
