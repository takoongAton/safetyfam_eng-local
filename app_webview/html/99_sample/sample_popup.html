<style>
:root {
	--text-label:#666666;
	--text-main:#000000;
	--text-gray-dark:#000000;
	--primary-color:#27aaff;
	--text-shadow:0 0 1px rgba(0, 0, 0, 0.16);
}

.dim {position:fixed; top:0; right:0; bottom:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.5); z-index:10000; backdrop-filter:blur(0.4px);}
/* 기본 팝업 */
.modal-side {display:block; /* 기본 숨김 */ flex-direction:column; align-items:flex-start; justify-content:flex-start; gap:10px; position:fixed; /* 고정 위치 */ top:50%; left:50%; width:298px; border-radius:24px; background-color:#fff; transform:translate(-50%, -50%); z-index:10001; box-shadow:0 4px 4px rgba(0, 0, 0, 0.05); overflow:hidden;}
.modal-side.active {display:flex;}
.modal-side__header {display:flex; flex-direction:column; align-items:center; gap:1.5em 0;}
/* .modal-side__label {display:block; color:var(--text-label, #666666); font-size:14px; line-height:1.29411em; letter-spacing:-0.026875rem; font-weight:500; word-break:keep-all;} */
.modal-side__icon {display:inline-flex; width:60px; height:60px;}
.modal-side__title {display:block; color:var(--text-main, #000000); font-size:18px; line-height:1.44444em; letter-spacing:-0.026875rem; font-weight:700; word-break:keep-all;}
.modal-side__desc {color:var(--text-gray-dark, #000000); font-size:16px; line-height:1.5em; letter-spacing:-0.025em;  text-align:center; word-break:keep-all;}

.modal-side__content {display:flex; flex-direction:column; gap:10px; width:100%; padding:36px 18px;}
.modal-side__footer {display:flex; flex-direction:row; justify-content:space-between; align-items:center; width:100%; border-top:1px solid #ccc;}

.modal-side__footer button {width:100%; height:60px; font-family:inherit; line-height:0; cursor:pointer;}
.modal-side__footer button span {display:inline-block; color:inherit; font-size:17px; line-height:1em; font-weight:500; vertical-align: -webkit-baseline-middle; text-shadow:var(--text-shadow);}
.modal-side__btn-cancel {color:#9F9F9F;}
.modal-side__btn-confirm {color:var(--primary-color);}
.modal-side__btn-confirm span {font-weight:700 !important; text-shadow:0 0 1px rgba(0, 0, 0, 0.16);}
/* // 기본 팝업 */
.input_test {display:flex; flex-direction:column; gap:5px; width:100%;}
.input_test input {width:100%; background-color:#F5F5F5; border:1px solid #ddd; height:46px; border-radius:12px; text-align:center !important;}
.input_test input::placeholder {color:#ff6600 !important;}

input[type="date"]::-webkit-date-and-time-value {
    margin: 0 auto;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
input[type="time"]::-webkit-date-and-time-value {
    margin: 0 auto;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }


.date-with-placeholder {
  position: relative;
}

/* 값이 비어있을 때 placeholder 텍스트를 보여줌 */
.date-with-placeholder::before {
	display:flex;
	align-items:center;
	justify-content:center;
  position: absolute;
  top: 0;
  left: 0;
  
  content: attr(data-placeholder);
  width: 100%;
  height:100%;
  color: #999;
  pointer-events: none;
}

/* 포커스되거나 값이 입력되면 placeholder를 숨김 */
.date-with-placeholder:focus::before,
.date-with-placeholder:valid::before {
  display: none;
}

/* 기본 텍스트 정렬을 위해 */
input[type="date"] {
	text-align: center;
	box-sizing:border-box;
	-webkit-appearance:none;
	appearance:none;
}
</style>




<div class="dim"></div>
<div class="modal-side" id="testpop123">
	<div class="modal-side__content">
		<div class="modal-side__header" style="display:none;">
			<!-- <p class="modal-side__label">개인정보 보호 서비스</p> -->
			<span class="modal-side__icon"><img src="../../images/common/ico_caution.png" alt="아이콘"></span>
			<p class="modal-side__title">비밀번호 입력</p>
			<p class="modal-side__desc">비밀번호가 초기화 되었습니다.<br />
				휴대폰 인증 후 비밀번호 재설정을 하시겠습니까?</p>
		</div>
		<div class="modal-side__custom">
			<div class="input_test">
				<div>
					<input type="text" placeholder="날짜를 선택하세요" onfocus="(this.type='date')" onblur="(this.value=='' ? this.type='text' : this.type='date')" id="dateInput" />
				</div>
				
				<div>
					<label for="input_test123" style="display:block; width:100%;">
						<input type="date" class="date-with-placeholder" data-placeholder="YYYY.MM.DD" required id="input_test123">
					</label>
				</div>

				<div>
					<input type="date" class="date-with-placeholder" data-placeholder="YYYY.MM.DD" required id="input_test12">
				</div>
				
				<div>
					<input type="time" class="date-with-placeholder" data-placeholder="HH:MM" name="" id="" style="width:100%;" />
				</div>

				<div>
					<input type="range" name="" id="" min="0" max="100" value="50" step="10" />
					<span class="range_val">50</span>
				</div>
			</div>
			
		</div>
	</div>
	<div class="modal-side__footer">
		<button type="button" class="btn modal-side__btn-cancel" id="btnExitCancel">
			<span>취소</span>
		</button>
		<button type="button" class="btn modal-side__btn-confirm" id="btnExitConfirm">
			<span>확인</span>
		</button>
	</div>
</div>





<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="../../js/slick.js"></script>
<script src="../../js/temp.js"></script>
<script>
	let inputRange = document.querySelector("input[type='range']");
	let rangeVal = document.querySelector(".range_val");
	inputRange.addEventListener("input", function() {
		rangeVal.innerText = this.value;
	});
</script>
